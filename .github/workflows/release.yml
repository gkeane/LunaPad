name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create, for example v1.4.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.version }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9] ]]; then
            echo "Release tag must start with v, got: $RELEASE_TAG" >&2
            exit 1
          fi

          APP_VERSION="${RELEASE_TAG#v}"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        shell: bash
        run: swift build -c release

      - name: Package app bundle
        shell: bash
        env:
          APP_VERSION: ${{ steps.meta.outputs.app_version }}
          APP_BUILD_NUMBER: ${{ github.run_number }}
        run: ./scripts/package-release.sh "${{ steps.meta.outputs.release_tag }}"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.meta.outputs.release_tag }}"
          ZIP_PATH="dist/LunaPad-${RELEASE_TAG}-macOS.zip"
          CHECKSUM_PATH="${ZIP_PATH}.sha256"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ZIP_PATH" "$CHECKSUM_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" \
              "$ZIP_PATH" \
              "$CHECKSUM_PATH" \
              --title "$RELEASE_TAG" \
              --notes "Automated release for $RELEASE_TAG" \
              --target "$GITHUB_SHA"
          fi
