name: LunaPad
options:
  bundleIdPrefix: io.github.gkeane
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

targets:
  LunaPad:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.gkeane.LunaPad
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: LunaPad
        CFBundleDocumentTypes:
          - CFBundleTypeName: Text and Source Files
            CFBundleTypeRole: Editor
            LSHandlerRank: Default
            CFBundleTypeExtensions:
              - txt
              - text
              - md
              - markdown
              - log
              - json
              - xml
              - yaml
              - yml
              - toml
              - csv
              - tsv
              - sh
              - zsh
              - bash
              - swift
              - js
              - ts
              - jsx
              - tsx
              - py
              - rb
              - java
              - c
              - h
              - m
              - mm
              - cpp
              - hpp
              - css
              - scss
              - html
              - htm
              - sql
              - ini
              - conf
              - cfg
            LSItemContentTypes:
              - public.text
              - public.plain-text
              - public.utf8-plain-text
              - public.source-code
              - net.daringfireball.markdown
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
